    <!--
      View gate MUST run before any link[rel=preload]. On cloud (forward_auth cookies),
      never set crossOrigin on same-origin preloads — Firefox omits cookies and stalls ~20s+.
    -->
    <script>
      (function () {
        try {
          /* Cloud trusted-device: mirror local device ID to cookie before any fetch. */
          (function syncDid() {
            var key = 'dashbird_did';
            var id = '';
            var m = document.cookie.match(new RegExp('(?:^|;\\s*)' + key + '=([^;]*)'));
            if (m) {
              try {
                id = decodeURIComponent(m[1]);
              } catch (e2) {
                id = m[1];
              }
            }
            if (!id) {
              try {
                id = String(localStorage.getItem(key) || '').trim();
              } catch (e) {}
            }
            if (!id && window.crypto && crypto.randomUUID) id = crypto.randomUUID();
            if (!id) return;
            try {
              localStorage.setItem(key, id);
            } catch (e3) {}
            var secure = location.protocol === 'https:' ? '; Secure' : '';
            document.cookie =
              key + '=' + encodeURIComponent(id) + '; Path=/; SameSite=Lax; Max-Age=31536000' + secure;
          })();
          if (localStorage.getItem('dashbird-sky-sidebar-hidden') === '1') {
            document.documentElement.classList.add('sky-sidebar-hidden');
          }
          var stored = localStorage.getItem('dashbirdView');
          var view = stored;
          var phone = false;
          if (view !== 'mobile' && view !== 'desktop') {
            var ua = String(navigator.userAgent || '');
            phone = /Android|iPhone|iPod|iPad|Mobile|webOS|BlackBerry|IEMobile|Opera Mini/i.test(ua);
            if (!phone && window.matchMedia) {
              phone = window.matchMedia('(max-width: 820px)').matches;
            }
            view = phone ? 'mobile' : 'desktop';
          }
          if (view === 'mobile') {
            document.documentElement.classList.add('dashbird-view-mobile');
            document.addEventListener('DOMContentLoaded', function () {
              var pm = document.getElementById('page-mobile');
              if (!pm) return;
              pm.hidden = false;
              var notes = document.getElementById('mount-mobile-notes');
              if (notes) {
                notes.hidden = false;
                if (!notes.childElementCount) {
                  notes.innerHTML = '<p class="mobile-shell__status">Loading…</p>';
                }
              }
            });
          } else {
            /* Desktop-only preloads — never /api/* (basic auth breaks Firefox). */
            var desktopPreloads = [
              ['/data/bookmarks-personal.json', 'fetch'],
              ['/data/bookmarks-work.json', 'fetch'],
              ['/assets/search-brave.png', 'image'],
              ['/assets/search-duckduckgo.png', 'image'],
            ];
            for (var i = 0; i < desktopPreloads.length; i++) {
              var link = document.createElement('link');
              link.rel = 'preload';
              link.href = desktopPreloads[i][0];
              link.as = desktopPreloads[i][1];
              document.head.appendChild(link);
            }
          }
        } catch (e) {}
      })();
    </script>

    <!-- Instant search: no modules — Enter opens a new tab before app.js loads. -->
    <script>
      window.__dashbirdSearch = (function () {
        var KEY = 'dashbird-search-engine';
        var ENGINES = {
          brave: function (q) {
            return 'https://search.brave.com/search?q=' + encodeURIComponent(q);
          },
          google: function (q) {
            return 'https://www.google.com/search?q=' + encodeURIComponent(q);
          },
          duckduckgo: function (q) {
            return 'https://duckduckgo.com/?q=' + encodeURIComponent(q);
          },
        };
        function engine() {
          var saved = '';
          try {
            saved = localStorage.getItem(KEY) || '';
          } catch (e) {}
          return ENGINES[saved] ? saved : 'brave';
        }
        function setEngine(id, root) {
          if (!ENGINES[id]) return;
          try {
            localStorage.setItem(KEY, id);
          } catch (e) {}
          if (!root) return;
          var buttons = root.querySelectorAll('button[data-engine]');
          for (var i = 0; i < buttons.length; i++) {
            var btn = buttons[i];
            var on = btn.getAttribute('data-engine') === id;
            btn.classList.toggle('web-search__engine-btn--active', on);
            btn.setAttribute('aria-pressed', on ? 'true' : 'false');
          }
        }
        function openSearch(q) {
          var query = String(q || '').trim();
          if (!query) return false;
          var id = engine();
          window.open(ENGINES[id](query), '_blank', 'noopener,noreferrer');
          return true;
        }
        function wire(root) {
          if (!root || root.getAttribute('data-search-enhanced') === '1') return;
          var form = root.querySelector('form.web-search');
          var input = root.querySelector('input.web-search__input') || document.getElementById('web-search-input');
          if (!form || !input) return;
          var current = engine();
          setEngine(current, root);
          var buttons = root.querySelectorAll('button[data-engine]');
          for (var i = 0; i < buttons.length; i++) {
            buttons[i].addEventListener('click', function (ev) {
              var btn = ev.currentTarget;
              setEngine(btn.getAttribute('data-engine'), root);
            });
          }
          form.addEventListener('submit', function (e) {
            e.preventDefault();
            openSearch(input.value);
          });
          // Enter must search even if something else stops form submit.
          input.addEventListener('keydown', function (e) {
            if (e.key !== 'Enter') return;
            e.preventDefault();
            openSearch(input.value);
          });
          root.setAttribute('data-search-enhanced', '1');
          var page = '';
          try {
            page = localStorage.getItem('dashbirdPage') || '';
          } catch (err) {}
          if (page !== 'settings' && page !== 'house-hunter' && page !== 'network' && page !== 'nrm') {
            input.focus({ preventScroll: true });
          }
        }
        return { wire: wire, openSearch: openSearch, setEngine: setEngine, engine: engine };
      })();
    </script>
