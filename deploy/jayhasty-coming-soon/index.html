<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jay Hasty</title>
  <meta name="description" content="Something new is on the way.">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d10;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --accent: #7c9cff;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #151a24 0%, var(--bg) 55%);
      color: var(--text);
    }
    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      text-align: center;
    }
    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 600;
      letter-spacing: -0.03em;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 28rem;
      line-height: 1.6;
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <div>
      <h1>Coming soon</h1>
      <p>New site in progress. Reach me at <a href="mailto:jay@jayhasty.com">jay@jayhasty.com</a>.</p>
    </div>
  </main>
</body>
</html>
