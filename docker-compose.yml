services:
  dashboard:
    build: .
    ports:
      - "0.0.0.0:${HOST_PORT:-8787}:3000"
    env_file:
      - .env
    # Host tree wins over image layers so new icons / calendar JSON apply without `compose build`.
    volumes:
      - ./public:/app/public
      - ./src:/app/src
      - ./data:/app/data
      # Linux: .desktop entries + ~/Applications AppImages for /api/open-desktop/* tiles
      - /usr/share/applications:/usr/share/applications:ro
      - ${LOCAL_APPLICATIONS_DIR:-${HOME}/.local/share/applications}:/root/.local/share/applications:ro
      - ${HOST_APPLICATIONS_DIR:-${HOME}/Applications}:/host/Applications:ro
      - /run/user/${UID:-1000}/bus:/run/user/1000/bus
      - /run/user/${UID:-1000}:/run/user/1000
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      PORT: "3000"
      HOME: /root
      HOST_APPLICATIONS_DIR: /host/Applications
      HOST_HOME: ${HOME}
      DASHBOARD_HOST_UID: ${UID:-1000}
      DISPLAY: ${DISPLAY:-:0}
      XDG_RUNTIME_DIR: /run/user/1000
      DBUS_SESSION_BUS_ADDRESS: ${DBUS_SESSION_BUS_ADDRESS:-unix:path=/run/user/1000/bus}
      RAIN_ALERT_DEBUG: ${RAIN_ALERT_DEBUG:-}
      RAIN_ALERT_DEBUG_MINUTES: ${RAIN_ALERT_DEBUG_MINUTES:-42}
      # Cloud (Vultr) is the sole Telegram getUpdates consumer. LAN + cloud both
      # polling the same bot token causes Conflict and split/missing ingests.
      TELEGRAM_EVENTS_ENABLED: "0"
    depends_on:
      vikunja:
        condition: service_started

  # Local Vikunja (todos). UI: http://<lan-ip>:3456/ — Dashbird proxies via /api/vikunja.
  vikunja:
    image: vikunja/vikunja:latest
    ports:
      - "0.0.0.0:${VIKUNJA_HOST_PORT:-3456}:3456"
    environment:
      VIKUNJA_SERVICE_PUBLICURL: ${VIKUNJA_SERVICE_PUBLICURL:-http://192.168.5.2:3456/}
      VIKUNJA_SERVICE_JWTSECRET: ${VIKUNJA_SERVICE_SECRET:-changeme-set-in-env}
      # Alias used by some docs / older configs
      VIKUNJA_SERVICE_SECRET: ${VIKUNJA_SERVICE_SECRET:-changeme-set-in-env}
      VIKUNJA_SERVICE_ENABLEREGISTRATION: "true"
    volumes:
      - ./data/vikunja/files:/app/vikunja/files
      - ./data/vikunja/db:/db
    restart: unless-stopped

  # Runs on the host network after dashboard starts; prints the phone URL and refreshes
  # public/data/phone-lan-url.txt for the sidebar link (gitignored).
  lan-url:
    image: node:20-alpine
    network_mode: host
    working_dir: /app
    volumes:
      - ./src/lib/lan-url.js:/app/src/lib/lan-url.js:ro
      - ./scripts/print-lan-url.mjs:/app/scripts/print-lan-url.mjs:ro
      - ./public/data:/app/public/data
      - ./.env:/app/.env:ro
    environment:
      HOST_PORT: ${HOST_PORT:-8787}
    depends_on:
      dashboard:
        condition: service_started
    command: ['node', 'scripts/print-lan-url.mjs', '--write']
    restart: 'no'
